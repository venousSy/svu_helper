services:
  nginx:
    image: nginx:alpine
    container_name: svu_helper_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard-api
      - mongo-express

  bot:
    build: .
    container_name: svu_helper_bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - MONGO_URI=${MONGO_URI}
      - REDIS_URI=redis://:${REDIS_PASS:-secret}@redis:6379/0
      - DB_NAME=${DB_NAME:-svu_helper_bot}
    depends_on:
      - mongo
      - redis

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: svu_helper_backup
    restart: always
    environment:
      # Authenticated URI for mongodump — fixes Issue #1 (missing auth)
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongo:27017/?authSource=admin
      - DB_NAME=${DB_NAME:-svu_helper_bot}
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-6}
    depends_on:
      - mongo
    networks:
      - default

  dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: svu_helper_dashboard_api
    restart: always
    environment:
      - MONGO_URI=${MONGO_URI}
      - DB_NAME=${DB_NAME:-svu_helper_bot}
      - PORT=8000
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-admin}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default_secret_key_change_me_in_production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      # Allows the React frontend served from ANY origin to call the API
      - DASHBOARD_CORS_ORIGIN=${DASHBOARD_CORS_ORIGIN}
      - ADMIN_IDS=${ADMIN_IDS}
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      - mongo
    ports:
      - "8000:8000"

  mongo:
    image: mongo:latest
    container_name: svu_helper_mongo
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-secret}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:alpine
    container_name: svu_helper_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASS:-secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongo-express:
    image: mongo-express
    container_name: svu_helper_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      # Correct env var names for mongo-express v1.x
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASS}
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_USER:-admin}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_PASS:-secret}
    depends_on:
      - mongo

networks:
  default:
    name: svu_helper_network

volumes:
  mongo_data:
  redis_data:

