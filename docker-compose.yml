version: '3.8'

services:
  bot:
    build: .
    container_name: svu_helper_bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URI=redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app # Mounts current directory for hot-reloading (optional, good for dev)

  dashboard-api:
    build: .
    command: uvicorn dashboard_api.main:app --host 0.0.0.0 --port 8000
    container_name: svu_helper_dashboard_api
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-admin}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default_secret_key_change_me_in_production}
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  mongo:
    image: mongo:latest
    container_name: svu_helper_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017" # Expose to host if you want to connect from outside

  redis:
    image: redis:alpine
    container_name: svu_helper_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongo-express:
    image: mongo-express
    container_name: svu_helper_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASS:-pass}
    depends_on:
      - mongo

volumes:
  mongo_data:
  redis_data:
